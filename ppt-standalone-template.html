<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDeck Presentation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>window.MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] }, svg: { fontCache: 'global' }, options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] } };</script>
    <script>__MATHJAX_INLINE_CODE__</script>
</head>
<body>
    <nav id="top-nav" style="opacity:0; pointer-events:none; transition: opacity 0.5s ease, transform 0.5s ease;">
        <div class="nav-links" id="nav-links"></div>
        <div id="global-logo">
            <img src="logo-badge.png" class="logo-badge" alt="Badge">
            <img src="logo-text.png" class="logo-text" alt="Text">
        </div>
    </nav>

    <div id="presentation"></div>

    <div id="eraser-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:11000; justify-content:center; align-items:center;">
        <div style="background:var(--glass-bg); padding:30px 40px; border-radius:16px; border:1px solid var(--glass-border); text-align:center; box-shadow:0 15px 35px var(--shadow-color); backdrop-filter:blur(20px);">
            <h3 style="margin-bottom:12px; font-weight:800; color:var(--accent-color); font-size:1.4rem;">擦除批注</h3>
            <p style="margin-bottom:22px; color:var(--text-secondary); font-size:1rem;">请选择只清空当前页，或清空全部页面的笔记。</p>
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                <button id="clearCurrentBtn" type="button" style="padding:10px 18px; font-weight:600; border:none; background:var(--accent-color); color:white; border-radius:8px; cursor:pointer;">当前页擦除</button>
                <button id="clearAllBtn" type="button" style="padding:10px 18px; font-weight:600; border:none; background:#ef4444; color:white; border-radius:8px; cursor:pointer;">全部擦除</button>
                <button id="cancelClearBtn" type="button" style="padding:10px 18px; font-weight:600; border:none; background:transparent; color:var(--text-secondary); border-radius:8px; cursor:pointer;">取消</button>
            </div>
        </div>
    </div>

    <div id="controls" class="hidden">
        <button id="eraserBtn" type="button" title="擦除批注">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
        </button>
        <button id="penBtn" type="button" title="开启/关闭批注笔">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        </button>

    </div>

    <script>
        let current = 0;
        let presentationData = __PRESENTATION_DATA__;
        let slidesData = presentationData.slides || [];
        let isPenMode = false;
        let laserDrawing = false;
        let laserLastX = 0;
        let laserLastY = 0;

        const presentation = document.getElementById('presentation');
        const navLinks = document.getElementById('nav-links');
        const penBtn = document.getElementById('penBtn');
        const eraserBtn = document.getElementById('eraserBtn');
        const eraserModal = document.getElementById('eraser-modal');
        const clearCurrentBtn = document.getElementById('clearCurrentBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const cancelClearBtn = document.getElementById('cancelClearBtn');

        const laserCanvas = document.createElement('canvas');
        laserCanvas.id = 'laser-canvas';
        laserCanvas.style.position = 'fixed';
        laserCanvas.style.inset = '0';
        laserCanvas.style.width = '100vw';
        laserCanvas.style.height = '100vh';
        laserCanvas.style.pointerEvents = 'none';
        laserCanvas.style.zIndex = '9999';
        document.body.appendChild(laserCanvas);
        const laserCtx = laserCanvas.getContext('2d');

        let globalSheet = null;
        let fallbackCss = null;

        function getSlideIndexFromHash() {
            const hash = window.location.hash;
            if (hash.startsWith('#slide-')) {
                const idx = parseInt(hash.replace('#slide-', ''), 10);
                if (!isNaN(idx) && idx >= 0 && idx < slidesData.length) {
                    return idx;
                }
            }
            return 0;
        }
        const IFRAME_RENDER_HINT_REGEX = /<!DOCTYPE\s+html|<html[\s>]|<head[\s>]|<body[\s>]|<script[\s>]|<link[\s>]|<meta[\s>]|<base[\s>]|<title[\s>]/i;
        const INLINE_HANDLER_HINT_REGEX = /\son[a-z][\w:-]*\s*=/i;
        const JAVASCRIPT_URL_HINT_REGEX = /\b(?:href|src|xlink:href)\s*=\s*["']?\s*javascript:/i;
        const REBASED_URL_ATTRIBUTES = ['src', 'href', 'poster', 'data', 'action', 'formaction', 'xlink:href'];
        const REBASED_SRCSET_ATTRIBUTES = ['srcset', 'imagesrcset'];
        const FULL_DOC_OVERRIDE_CSS = `
            html, body {
                width: 100% !important;
                height: 100% !important;
                min-height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow-x: hidden !important;
                overflow-y: auto !important;
            }
            body {
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
            }
            .slide-container {
                width: 100% !important;
                height: 100% !important;
                max-width: none !important;
                max-height: none !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                margin: 0 !important;
                transform: none !important;
            }
            canvas, iframe, video, img {
                display: block !important;
            }
            * { box-sizing: border-box !important; }
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-thumb { background: rgba(0, 94, 170, 0.2); border-radius: 4px; }
        `;

        function shouldRenderInIframe(rawHtml, explicit = false) {
            const html = rawHtml || '';
            return explicit === true
                || IFRAME_RENDER_HINT_REGEX.test(html)
                || INLINE_HANDLER_HINT_REGEX.test(html)
                || JAVASCRIPT_URL_HINT_REGEX.test(html);
        }

        function createSlideBaseUrl(chapterPrefix) {
            return new URL(`slides/${encodeURIComponent(chapterPrefix)}/`, window.location.href);
        }

        function rebaseAssetUrl(urlValue, baseUrl) {
            const trimmed = (urlValue || '').trim();
            if (!trimmed || /^(?:[a-z][a-z0-9+.-]*:|\/\/|#|\/)/i.test(trimmed)) {
                return urlValue;
            }

            try {
                return new URL(trimmed, baseUrl).toString();
            } catch {
                return urlValue;
            }
        }

        function rewriteCssUrls(cssText, baseUrl) {
            return (cssText || '').replace(/url\(\s*(['"]?)([^'"()]+)\1\s*\)/gi, (match, quote, assetPath) => {
                const rebasedUrl = rebaseAssetUrl(assetPath, baseUrl);
                if (rebasedUrl === assetPath) {
                    return match;
                }
                return `url("${rebasedUrl}")`;
            });
        }

        function rebaseSrcsetValue(srcsetValue, baseUrl) {
            return (srcsetValue || '').split(',').map(candidate => {
                const trimmedCandidate = candidate.trim();
                if (!trimmedCandidate) {
                    return trimmedCandidate;
                }

                const parts = trimmedCandidate.split(/\s+/);
                const assetPath = parts.shift();
                const descriptor = parts.join(' ');
                const rebasedUrl = rebaseAssetUrl(assetPath, baseUrl);
                return descriptor ? `${rebasedUrl} ${descriptor}` : rebasedUrl;
            }).join(', ');
        }

        function rebaseFragmentAssetUrls(fragmentRoot, baseUrl) {
            fragmentRoot.querySelectorAll('*').forEach(node => {
                REBASED_URL_ATTRIBUTES.forEach(attributeName => {
                    if (!node.hasAttribute(attributeName)) {
                        return;
                    }

                    const originalValue = node.getAttribute(attributeName);
                    const rebasedValue = rebaseAssetUrl(originalValue, baseUrl);
                    if (rebasedValue !== originalValue) {
                        node.setAttribute(attributeName, rebasedValue);
                    }
                });

                REBASED_SRCSET_ATTRIBUTES.forEach(attributeName => {
                    if (!node.hasAttribute(attributeName)) {
                        return;
                    }

                    const originalValue = node.getAttribute(attributeName);
                    const rebasedValue = rebaseSrcsetValue(originalValue, baseUrl);
                    if (rebasedValue !== originalValue) {
                        node.setAttribute(attributeName, rebasedValue);
                    }
                });

                if (node.hasAttribute('style')) {
                    node.setAttribute('style', rewriteCssUrls(node.getAttribute('style'), baseUrl));
                }
            });

            fragmentRoot.querySelectorAll('style').forEach(styleNode => {
                styleNode.textContent = rewriteCssUrls(styleNode.textContent, baseUrl);
            });
        }

        function buildFragmentContent(rawHtml, baseUrl) {
            const template = document.createElement('template');
            template.innerHTML = rawHtml || '';
            rebaseFragmentAssetUrls(template.content, baseUrl);
            return template.content;
        }

        function buildIframeSrcdoc(rawHtml, { baseHref, overrideCssText }) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(rawHtml || '', 'text/html');
            const head = doc.head || doc.getElementsByTagName('head')[0] || doc.documentElement.insertBefore(doc.createElement('head'), doc.body || null);

            if (!doc.documentElement.getAttribute('lang')) {
                doc.documentElement.setAttribute('lang', 'zh-CN');
            }

            let baseElement = head.querySelector('base');
            if (!baseElement) {
                baseElement = doc.createElement('base');
                head.prepend(baseElement);
            }
            baseElement.setAttribute('href', baseHref);

            const overrideStyle = doc.createElement('style');
            overrideStyle.setAttribute('data-webdeck-injected', 'true');
            overrideStyle.textContent = overrideCssText;
            head.appendChild(overrideStyle);

            // Inject MathJax for formula rendering inside iframes (offline, from parent)
            const mjConfig = doc.createElement('script');
            mjConfig.textContent = 'window.MathJax = { tex: { inlineMath: [["$","$"],["\\\\(","\\\\)"]], displayMath: [["$$","$$"],["\\\\[","\\\\]"]] }, svg: { fontCache: "global" }, options: { skipHtmlTags: ["script","noscript","style","textarea","pre"] } };';
            head.appendChild(mjConfig);
            const mjLoader = doc.createElement('script');
            mjLoader.textContent = 'try { eval(parent.__MATHJAX_CODE__); } catch(e) { var s=document.createElement("script"); s.src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"; document.head.appendChild(s); }';
            head.appendChild(mjLoader);

            return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
        }

        async function init() {
            if (!Array.isArray(slidesData) || slidesData.length === 0) {
                document.body.innerHTML = '<h1 style="color:red;padding:20px;">No slides were exported.</h1>';
                return;
            }
            
            current = getSlideIndexFromHash();
            
            globalSheet = new CSSStyleSheet();
            fallbackCss = null;
            if (presentationData.globalCss) {
                try {
                    await globalSheet.replace(presentationData.globalCss);
                } catch(e) {
                    fallbackCss = presentationData.globalCss;
                }
            }
            
            render();
            bindGlobalEvents();
            setupNavDropdown();
        }

        function render() {
            const chapters = (presentationData.chapters || []).filter(chapter => chapter.showInNav && !chapter.hideNav);

            navLinks.innerHTML = chapters.map(chapter =>
                `<div class="nav-item ${chapter.isEmpty ? 'empty-chapter' : ''}" data-index="${chapter.startIndex}" data-prefix="${chapter.prefix}" data-empty="${chapter.isEmpty ? '1' : '0'}">${chapter.title}</div>`
            ).join('');

            presentation.innerHTML = slidesData.map((slide, index) => {
                const slideChapter = (presentationData.chapters || []).find(ch => ch.prefix === slide.chapterPrefix);
                const isNavHidden = slideChapter?.hideNav === true || slide.chapterPrefix === '01_封面' || slide.chapterPrefix === '00_首页' || index === 0;
                const coverAttr = isNavHidden ? 'data-cover="true"' : '';
                
                const rawHtml = slide.rawHtml || slide.html || '';
                const isFullBleed = shouldRenderInIframe(rawHtml, slide.isFullBleed);
                const extraClass = isFullBleed ? ' is-full-bleed' : '';
                
                const innerContent = isFullBleed
                    ? `<iframe class="slide-iframe" data-slide-idx="${index}"></iframe>`
                    : `<div class="shadow-host" data-slide-idx="${index}" style="width:100%; height:100%; display:flex; flex-direction:column; flex:1;"></div>`;
                return `<section class="slide${extraClass} ${index === 0 ? 'active' : 'next'}" data-index="${index}" data-prefix="${slide.chapterPrefix}" ${coverAttr}>
                    <canvas class="annotation-canvas"></canvas>
                    <div class="slide-content" style="display:flex; flex-direction:column; width:100%; height:100%; flex:1;">${innerContent}</div>
                </section>`;
            }).join('');

            // Populate iframes with raw HTML via srcdoc property
            document.querySelectorAll('.slide-iframe').forEach(iframe => {
                iframe.onload = () => {
                    try {
                        const iframeWin = iframe.contentWindow;
                        iframeWin.addEventListener('click', () => window.focus());
                        iframeWin.addEventListener('contextmenu', e => e.preventDefault());
                        ['mousedown', 'mousemove', 'mouseup'].forEach(evtType => {
                            iframeWin.addEventListener(evtType, e => {
                                const rect = iframe.getBoundingClientRect();
                                document.dispatchEvent(new MouseEvent(evtType, {
                                    clientX: e.clientX + rect.left,
                                    clientY: e.clientY + rect.top,
                                    button: e.button, ctrlKey: e.ctrlKey, metaKey: e.metaKey, bubbles: true
                                }));
                            });
                        });
                        // Forward wheel events only when iframe content is at scroll edge
                        iframeWin.addEventListener('wheel', e => {
                            try {
                                const doc = iframeWin.document.documentElement;
                                const body = iframeWin.document.body;
                                const scrollTop = Math.max(doc.scrollTop, body.scrollTop);
                                const scrollHeight = Math.max(doc.scrollHeight, body.scrollHeight);
                                const clientHeight = doc.clientHeight;
                                const atTop = scrollTop <= 1;
                                const atBottom = scrollTop + clientHeight >= scrollHeight - 1;
                                if (e.deltaY > 0 && !atBottom) return;
                                if (e.deltaY < 0 && !atTop) return;
                            } catch(err) {}
                            document.dispatchEvent(new WheelEvent('wheel', { deltaY: e.deltaY, bubbles: true }));
                        }, { passive: true });
                    } catch(e) {}
                };
                const idx = parseInt(iframe.dataset.slideIdx, 10);
                const slide = slidesData[idx];
                if (slide) {
                    const rawHtml = slide.rawHtml || slide.html || '';
                    iframe.srcdoc = buildIframeSrcdoc(rawHtml, {
                        baseHref: createSlideBaseUrl(slide.chapterPrefix).toString(),
                        overrideCssText: FULL_DOC_OVERRIDE_CSS
                    });
                }
            });

            const mathjaxRoots = [document.body];

            // Populate Shadow DOMs for fragments
            document.querySelectorAll('.shadow-host').forEach(host => {
                const idx = parseInt(host.dataset.slideIdx, 10);
                const slide = slidesData[idx];
                if (slide) {
                    const shadow = host.attachShadow({ mode: 'open' });
                    
                    const rawHtml = slide.rawHtml || slide.html || '';
                    shadow.innerHTML = '';
                    shadow.appendChild(buildFragmentContent(rawHtml, createSlideBaseUrl(slide.chapterPrefix)));

                    if (fallbackCss) {
                        const style = document.createElement('style');
                        style.textContent = fallbackCss;
                        shadow.prepend(style);
                    } else {
                        shadow.adoptedStyleSheets = [globalSheet];
                    }
                    
                    mathjaxRoots.push(shadow);
                }
            });

            // MathJax MutationObserver
            const mjxSheet = new CSSStyleSheet();
            function observeMathJax() {
                const mjxStyle = document.getElementById('MJX-CHTML-styles');
                if (mjxStyle) {
                    try { mjxSheet.replace(mjxStyle.textContent); } catch(e) {}
                    const observer = new MutationObserver(() => {
                        try { mjxSheet.replace(mjxStyle.textContent); } catch(e) {}
                    });
                    observer.observe(mjxStyle, { childList: true, characterData: true, subtree: true });
                    
                    mathjaxRoots.forEach(root => {
                        if (root !== document.body && !root.adoptedStyleSheets.includes(mjxSheet)) {
                            root.adoptedStyleSheets = [...root.adoptedStyleSheets, mjxSheet];
                        }
                    });
                } else {
                    const headObserver = new MutationObserver(() => {
                        if (document.getElementById('MJX-CHTML-styles')) {
                            headObserver.disconnect();
                            observeMathJax();
                        }
                    });
                    headObserver.observe(document.head, { childList: true });
                }
            }
            function waitForMathJaxTypeset(roots, options = {}) {
                const { interval = 100, maxAttempts = 100 } = options;
                let attempts = 0;
                const checkMathJax = setInterval(() => {
                    attempts += 1;
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        clearInterval(checkMathJax);
                        window.MathJax.typesetPromise(roots).catch(err => console.error('MathJax Error:', err));
                    } else if (attempts >= maxAttempts) {
                        clearInterval(checkMathJax);
                        console.warn('MathJax load timeout in standalone template');
                    }
                }, interval);
            }
            observeMathJax();
            waitForMathJaxTypeset(mathjaxRoots);

            bindSlideEvents();
            setupAnnotationCanvases();
            resizeLaserCanvas();
            update();
        }
        function bindSlideEvents() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.onclick = () => {
                    if (item.dataset.empty === '1') return;
                    current = parseInt(item.dataset.index, 10);
                    update();
                };
            });
        }

        function setupAnnotationCanvases() {
            document.querySelectorAll('.annotation-canvas').forEach(canvas => {
                resizeCanvas(canvas);

                if (canvas.dataset.bound === '1') return;
                canvas.dataset.bound = '1';

                const ctx = canvas.getContext('2d');
                const state = { drawing: false, lastX: 0, lastY: 0 };

                canvas.addEventListener('mousedown', event => {
                    if (event.button !== 0 || !isPenMode) return;
                    const rect = canvas.getBoundingClientRect();
                    state.drawing = true;
                    state.lastX = event.clientX - rect.left;
                    state.lastY = event.clientY - rect.top;
                });

                canvas.addEventListener('mousemove', event => {
                    if (!state.drawing || !isPenMode) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    ctx.beginPath();
                    ctx.moveTo(state.lastX, state.lastY);
                    ctx.lineTo(x, y);
                    ctx.strokeStyle = '#38bdf8';
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = '#0284c7';
                    ctx.stroke();
                    state.lastX = x;
                    state.lastY = y;
                });

                canvas.addEventListener('mouseleave', () => {
                    state.drawing = false;
                });

                window.addEventListener('mouseup', () => {
                    state.drawing = false;
                });
            });

            syncPenState();
        }

        function resizeCanvas(canvas) {
            const ratio = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            const ctx = canvas.getContext('2d');
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        }

        function resizeLaserCanvas() {
            const ratio = window.devicePixelRatio || 1;
            laserCanvas.width = window.innerWidth * ratio;
            laserCanvas.height = window.innerHeight * ratio;
            laserCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
        }

        function syncPenState() {
            document.querySelectorAll('.annotation-canvas').forEach(canvas => {
                canvas.style.pointerEvents = isPenMode ? 'auto' : 'none';
            });
            penBtn.classList.toggle('active', isPenMode);
        }

        function update() {
            const slides = document.querySelectorAll('.slide');
            const navItems = document.querySelectorAll('.nav-item');
            const slideData = slidesData[current];
            const prefix = slideData?.chapterPrefix;
            
            // 查找当前幻灯片所属章节的 hideNav 配置
            const currentChapter = (presentationData.chapters || []).find(ch => ch.prefix === prefix);
            const chapterHideNav = currentChapter?.hideNav === true;
            
            // 增加精确的无顶栏模式推断
            const isNavHidden = prefix === '01_封面' || prefix === '00_首页' || current === 0 || chapterHideNav;

            slides.forEach((slide, index) => {
                const rawHtml = slidesData[index]?.rawHtml || slidesData[index]?.html || '';
                const isFullBleed = shouldRenderInIframe(rawHtml, slidesData[index]?.isFullBleed) ? ' is-full-bleed' : '';
                slide.className = 'slide' + isFullBleed + ' ' + (index === current ? 'active' : (index < current ? 'prev' : 'next'));
                
                // Reset horizontal scroll on the active slide to prevent left-truncation
                if (index === current) {
                    const content = slide.querySelector('.slide-content');
                    if (content) {
                        content.scrollLeft = 0;
                    }
                }
            });

            navItems.forEach(item => {
                item.classList.toggle('active', item.dataset.prefix === prefix);
            });

            const nav = document.getElementById('top-nav');
            const presentation = document.getElementById('presentation');

            // 统一处理导航栏透明度与全屏平铺样式的挂载
            if (isNavHidden) {
                if (nav) {
                    nav.style.opacity = '0';
                    nav.style.transform = 'translateY(-20px)';
                    nav.style.pointerEvents = 'none';
                }
                if (presentation) presentation.classList.add('no-nav');
            } else {
                if (nav) {
                    nav.style.opacity = '1';
                    nav.style.transform = 'translateY(0)';
                    nav.style.pointerEvents = 'auto';
                }
                if (presentation) presentation.classList.remove('no-nav');
            }

            if (window.MathJax?.typesetPromise) {
                window.MathJax.typesetPromise();
            }

            // Update URL hash to persist current slide on refresh/bookmark
            window.location.hash = 'slide-' + current;

            // Update active state in nav dropdown if open
            const activeCard = document.querySelector(`.micro-slide-card[data-slide-idx="${current}"]`);
            if (activeCard) {
                document.querySelectorAll('.micro-slide-card').forEach(c => c.classList.remove('active'));
                activeCard.classList.add('active');
            }
        }

        // --- Rapid navigation: skip transition when pressing keys fast ---
        let navTimer = null;
        function skipTransitionIfRapid() {
            const slides = document.querySelectorAll('.slide');
            if (navTimer) {
                clearTimeout(navTimer);
                slides.forEach(s => s.style.transition = 'none');
            }
            navTimer = setTimeout(() => {
                slides.forEach(s => s.style.transition = '');
                navTimer = null;
            }, 400);
        }

        function nextSlide() {
            if (current < slidesData.length - 1) {
                skipTransitionIfRapid();
                current += 1;
                update();
            }
        }

        function prevSlide() {
            if (current > 0) {
                skipTransitionIfRapid();
                current -= 1;
                update();
            }
        }

        function bindGlobalEvents() {
            penBtn.addEventListener('click', () => {
                isPenMode = !isPenMode;
                syncPenState();
            });

            eraserBtn.addEventListener('click', () => {
                eraserModal.style.display = 'flex';
            });

            cancelClearBtn.addEventListener('click', () => {
                eraserModal.style.display = 'none';
            });

            clearCurrentBtn.addEventListener('click', () => {
                const activeCanvas = document.querySelector(`.slide[data-index="${current}"] .annotation-canvas`);
                if (activeCanvas) {
                    const ctx = activeCanvas.getContext('2d');
                    ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
                }
                eraserModal.style.display = 'none';
            });

            clearAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.annotation-canvas').forEach(canvas => {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                });
                eraserModal.style.display = 'none';
            });

            // Elegant startup notification for keyboard shortcut to toggle toolbox visibility
            const controlsElement = document.getElementById('controls');
            if (controlsElement) {
                const tip = document.createElement('div');
                tip.style.cssText = 'position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(15,23,42,0.85); color:white; padding:10px 24px; border-radius:30px; font-size:0.95rem; font-weight:600; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); z-index:10000; transition:opacity 0.8s ease; pointer-events:none; box-shadow: 0 10px 25px rgba(0,0,0,0.25);';
                tip.innerHTML = '💡 提示：按 <b style="color:#38bdf8;padding:0 3px;">T</b> 或 <b style="color:#38bdf8;padding:0 3px;">H</b> 键可切换工具栏的显示与隐藏';
                document.body.appendChild(tip);
                setTimeout(() => {
                    tip.style.opacity = '0';
                    setTimeout(() => tip.remove(), 800);
                }, 4000);
            }

            document.addEventListener('keydown', event => {
                if ((event.key === 'ArrowRight' || event.key === ' ') && current < slidesData.length - 1) {
                    current += 1;
                    update();
                }
                if (event.key === 'ArrowLeft' && current > 0) {
                    current -= 1;
                    update();
                }
                if (event.key.toLowerCase() === 't' || event.key.toLowerCase() === 'h') {
                    const controls = document.getElementById('controls');
                    if (controls) {
                        controls.classList.toggle('hidden');
                    }
                }
            });

            // Ensure clicks anywhere (including on iframes) return focus to the main window
            // so keyboard navigation always works — critical for file:// protocol where
            // cross-origin iframe contentWindow access is blocked.
            document.addEventListener('click', () => window.focus());
            window.addEventListener('blur', () => {
                setTimeout(() => window.focus(), 50);
            });

            document.addEventListener('contextmenu', event => {
                event.preventDefault();
            });

            document.addEventListener('mousedown', event => {
                if (event.button === 2 || (event.button === 0 && (event.ctrlKey || event.metaKey))) {
                    laserDrawing = true;
                    laserLastX = event.clientX;
                    laserLastY = event.clientY;
                }
            });

            document.addEventListener('mousemove', event => {
                if (!laserDrawing) return;
                laserCtx.beginPath();
                laserCtx.moveTo(laserLastX, laserLastY);
                laserCtx.lineTo(event.clientX, event.clientY);
                laserCtx.strokeStyle = '#ff0000';
                laserCtx.lineWidth = 4;
                laserCtx.lineCap = 'round';
                laserCtx.lineJoin = 'round';
                laserCtx.shadowBlur = 10;
                laserCtx.shadowColor = 'rgba(255, 0, 0, 0.8)';
                laserCtx.stroke();
                laserLastX = event.clientX;
                laserLastY = event.clientY;
            });

            document.addEventListener('mouseup', event => {
                laserDrawing = false;
            });

            window.addEventListener('resize', () => {
                document.querySelectorAll('.annotation-canvas').forEach(resizeCanvas);
                resizeLaserCanvas();
            });

            // --- Mouse Wheel Navigation (smart: respects scrollable content) ---
            let wheelCooldown = false;
            document.addEventListener('wheel', event => {
                if (wheelCooldown || isPenMode) return;
                const activeSlide = document.querySelector('.slide.active');
                if (activeSlide && !activeSlide.classList.contains('is-full-bleed')) {
                    const content = activeSlide.querySelector('.slide-content');
                    if (content && content.scrollHeight > content.clientHeight + 2) {
                        const { scrollTop, scrollHeight, clientHeight } = content;
                        if (event.deltaY > 0 && scrollTop + clientHeight < scrollHeight - 2) return;
                        if (event.deltaY < 0 && scrollTop > 2) return;
                    }
                }
                wheelCooldown = true;
                setTimeout(() => wheelCooldown = false, 600);
                if (event.deltaY > 0) nextSlide();
                else if (event.deltaY < 0) prevSlide();
            }, { passive: true });

            // --- Edge Click Navigation Zones ---
            const navOverlay = document.createElement('div');
            navOverlay.style.cssText = 'position:fixed;inset:0;z-index:100;pointer-events:none;';
            function createNavZone(side) {
                const zone = document.createElement('div');
                zone.className = 'nav-zone nav-zone-' + side;
                zone.innerHTML = side === 'left'
                    ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>'
                    : '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';
                zone.onclick = () => side === 'left' ? prevSlide() : nextSlide();
                return zone;
            }
            navOverlay.appendChild(createNavZone('left'));
            navOverlay.appendChild(createNavZone('right'));
            document.body.appendChild(navOverlay);

            // Listen to browser navigation / hash change
            window.addEventListener('hashchange', () => {
                const idx = getSlideIndexFromHash();
                if (idx !== current) {
                    current = idx;
                    update();
                }
            });

            fadeLaser();
        }

        // --- Navigation Hover Dropdown Logic ---
        let hoverTriggerTimer = null;
        let hoverCloseTimer = null;
        let isDropdownOpen = false;
        let activeDropdownChapter = null;

        function setupNavDropdown() {
            const topNav = document.getElementById('top-nav');
            if (!topNav) return;
            
            // Create dropdown panel if it doesn't exist
            let dropdownPanel = document.getElementById('nav-dropdown');
            if (!dropdownPanel) {
                dropdownPanel = document.createElement('div');
                dropdownPanel.id = 'nav-dropdown';
                dropdownPanel.className = 'nav-dropdown-panel';
                topNav.appendChild(dropdownPanel);
            }
            
            // Bind mouse events to dropdown panel to keep it open
            dropdownPanel.onmouseenter = () => {
                if (hoverCloseTimer) {
                    clearTimeout(hoverCloseTimer);
                    hoverCloseTimer = null;
                }
            };
            
            dropdownPanel.onmouseleave = () => {
                startCloseTimer();
            };
            
            // Bind mouse events to nav items
            const bindNavHoverEvents = () => {
                document.querySelectorAll('.nav-item').forEach(item => {
                    if (item.dataset.empty === '1') return; // Skip empty chapters
                    
                    item.onmouseenter = () => {
                        const prefix = item.dataset.prefix;
                        if (hoverCloseTimer) {
                            clearTimeout(hoverCloseTimer);
                            hoverCloseTimer = null;
                        }
                        
                        if (isDropdownOpen) {
                            // Switch immediately if already open
                            if (activeDropdownChapter !== prefix) {
                                showDropdownForChapter(prefix);
                            }
                        } else {
                            // Trigger with delay if opening from closed state
                            if (hoverTriggerTimer) clearTimeout(hoverTriggerTimer);
                            hoverTriggerTimer = setTimeout(() => {
                                showDropdownForChapter(prefix);
                            }, 450);
                        }
                    };
                    
                    item.onmouseleave = () => {
                        if (hoverTriggerTimer) {
                            clearTimeout(hoverTriggerTimer);
                            hoverTriggerTimer = null;
                        }
                        startCloseTimer();
                    };
                });
            };
            
            bindNavHoverEvents();
        }

        function startCloseTimer() {
            if (hoverCloseTimer) clearTimeout(hoverCloseTimer);
            hoverCloseTimer = setTimeout(() => {
                hideDropdown();
            }, 300);
        }

        function hideDropdown() {
            const dropdownPanel = document.getElementById('nav-dropdown');
            if (dropdownPanel) {
                dropdownPanel.classList.remove('show');
            }
            isDropdownOpen = false;
            activeDropdownChapter = null;
        }

        function showDropdownForChapter(prefix) {
            const dropdownPanel = document.getElementById('nav-dropdown');
            if (!dropdownPanel) return;
            
            // Filter slides belonging to this chapter
            const chapterSlides = slidesData.filter(slide => slide.chapterPrefix === prefix);
            if (chapterSlides.length === 0) {
                hideDropdown();
                return;
            }
            
            activeDropdownChapter = prefix;
            isDropdownOpen = true;
            
            // Build dropdown inner HTML
            const cardsHtml = chapterSlides.map(slide => {
                const globalIndex = slidesData.indexOf(slide);
                const isActive = (globalIndex === current) ? ' active' : '';
                const title = slide.title || '幻灯片';
                const displayIndex = globalIndex + 1;
                
                return `
                    <div class="micro-slide-card${isActive}" data-slide-idx="${globalIndex}" title="点击跳转至：${title}">
                        <div class="micro-preview-container">
                            <iframe class="micro-preview-iframe" data-src-idx="${globalIndex}"></iframe>
                            <div class="micro-preview-blocker"></div>
                        </div>
                        <div class="micro-card-info">
                            <span class="micro-card-title">${title}</span>
                            <span class="micro-card-number">${displayIndex < 10 ? '0' + displayIndex : displayIndex}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            dropdownPanel.innerHTML = `<div class="nav-dropdown-cards">${cardsHtml}</div>`;
            
            // Add click listeners to cards
            dropdownPanel.querySelectorAll('.micro-slide-card').forEach(card => {
                card.onclick = () => {
                    const idx = parseInt(card.dataset.slideIdx, 10);
                    current = idx;
                    update();
                    hideDropdown();
                };
            });
            
            // Show panel
            dropdownPanel.classList.add('show');
            
            // Lazy load micro iframes
            setTimeout(() => {
                dropdownPanel.querySelectorAll('.micro-preview-iframe').forEach(iframe => {
                    const idx = parseInt(iframe.dataset.srcIdx, 10);
                    const slide = slidesData[idx];
                    if (slide) {
                        const rawHtml = slide.rawHtml || slide.html || '';
                        
                        iframe.srcdoc = buildIframeSrcdoc(rawHtml, {
                            baseHref: createSlideBaseUrl(slide.chapterPrefix).toString(),
                            overrideCssText: `
                                html, body { width: 100% !important; height: auto !important; min-height: 100% !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; background-color: transparent !important; }
                                body { display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; }
                                .slide-container { width: 100% !important; height: auto !important; min-height: 100vh !important; max-width: none !important; max-height: none !important; box-shadow: none !important; border-radius: 0 !important; margin: 0 !important; padding: 40px 60px !important; transform: none !important; }
                                canvas, iframe, video, img { display: block !important; }
                                * { box-sizing: border-box !important; }
                            `
                        });
                    }
                });
            }, 50);
        }

        function fadeLaser() {
            if (!laserDrawing) {
                laserCtx.shadowBlur = 0;
                laserCtx.globalCompositeOperation = 'destination-out';
                laserCtx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                laserCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                laserCtx.globalCompositeOperation = 'source-over';
            }
            requestAnimationFrame(fadeLaser);
        }

        init().catch(err => {
            console.error('[WebDeck] Init failed:', err);
            document.body.innerHTML = `<div style="padding:40px; color:#ef4444; font-family:system-ui;">
                <h1>⚠️ 演示加载失败</h1>
                <pre style="margin-top:16px; padding:16px; background:#1e293b; color:#fbbf24; border-radius:8px; overflow:auto;">${err?.stack || err}</pre>
            </div>`;
        });
    </script>
</body>
</html>
