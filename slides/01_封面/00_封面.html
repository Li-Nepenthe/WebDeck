<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文汇报封面</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #F4F6F9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 16:9 标准 PPT 演示画布：大厂极简纯白风格 */
        .slide-container {
            width: 100vw;
            height: 56.25vw; /* 完美的 16:9 比例锁定 */
            max-width: 1920px;
            max-height: 1080px;
            /* 纯白主色调，微调轻淡灰白色渐变以增加空间厚度 */
            background: linear-gradient(135deg, #FFFFFF 0%, #FAFAFA 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6% 8%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
        }

        /* 右侧极其轻淡的现代几何微光，打破纯白死板，提升呼吸感 */
        .slide-container::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 65%;
            height: 150%;
            background: radial-gradient(circle at 70% 30%, rgba(0, 82, 204, 0.02) 0%, transparent 65%);
            pointer-events: none;
            z-index: 1;
        }

        /* 顶部元数据区：严谨的学术/工业级排版 */
        .header-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 2;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .journal-tag {
            border: 1px solid #0052CC;
            color: #0052CC;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 3px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .journal-title {
            color: #666666;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* 中部核心主副标题区 */
        .main-content {
            margin: auto 0;
            max-width: 85%;
            position: relative;
            z-index: 2;
        }

        /* 左侧高端大厂深蓝修饰线 */
        .accent-bar {
            width: 4px;
            height: 48px;
            background-color: #0052CC;
            position: absolute;
            left: -32px;
            top: 10px;
            border-radius: 2px;
            animation: growHeight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            color: #111111; /* 曜石黑主标题，极高可读性 */
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
            animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .subtitle {
            color: #444444; /* 优雅深灰副标题 */
            font-size: 1.35rem;
            font-weight: 400;
            line-height: 1.6;
            letter-spacing: 0.5px;
            animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        /* 底部信息区：完美对齐的模块化栅格 */
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid #E5E9F0;
            padding-top: 4%;
            z-index: 2;
            animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-block .label {
            color: #888888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .info-block .value {
            color: #222222;
            font-size: 1.15rem;
            font-weight: 500;
        }

        .info-block .value.authors {
            color: #555555;
            font-size: 1.05rem;
        }

        /* 动画过渡 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes growHeight {
            from { height: 0; }
            to { height: 48px; }
        }

        /* 响应式自适应大屏缩放 */
        @media (max-width: 1400px) {
            h1 { font-size: 2.6rem; }
            .subtitle { font-size: 1.15rem; }
            .info-block .value { font-size: 1rem; }
            .info-block .value.authors { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <div class="header-meta">
            <span class="journal-tag">IEEE IoT-J</span>
            <span class="journal-title">IEEE Internet of Things Journal, Vol. 12, No. 12, June 2025</span>
        </div>

        <div class="main-content">
            <div class="accent-bar"></div>
            <h1>RoundImage: Toward Secure Graphical Password<br>Authentication via Rounded Image Selection in IoT</h1>
            <p class="subtitle">物联网环境下基于多轮图像选择与容错验证的图形密码认证框架</p>
        </div>

        <div class="footer-info">
            <div class="info-block">
                <div class="label">Original Authors</div>
                <div class="value authors">Xinyuan Qin, Wenjuan Li, Philip Rosenberg</div>
            </div>
            
            <div class="info-block" style="min-width: 140px;">
                <div class="label">Presented By</div>
                <div class="value" style="font-weight: 600; color: #0052CC;">李健</div>
            </div>

            <div class="info-block" style="text-align: right;">
                <div class="label">Date of Seminar</div>
                <div class="value" style="font-family: monospace; letter-spacing: 0.5px;">2026/05/26</div>
            </div>
        </div>
    </div>

</body>
</html>
